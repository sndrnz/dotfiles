set-option -g default-terminal "tmux-256color"
set-option -g status-position top

set-option -g pane-border-status top
set-option -g pane-border-format ' #{b:pane_current_path} • #{pane_current_command} '
set-option -g pane-active-border-style fg=default
set-option -g pane-border-lines double
set-option -g pane-border-indicators off

# Keybindings

set-option -g prefix C-a
bind-key C-a send-prefix

bind-key r source-file ~/.tmux.conf

bind-key | split-window -h
bind-key _ split-window -v

bind-key & kill-window
bind-key x kill-pane

# Theme

set-option -g @catppuccin_flavor "mocha"
set-option -g @catppuccin_window_status_style "rounded"
set-option -g @catppuccin_status_background "#{@thm_bg}"


# If the window name is "zsh" (the default title), show the pane title (#T) instead;
# otherwise display the window name (#{window_name})
set-option -g @catppuccin_window_text " #{?#{==:#{window_name},zsh},#T,#{window_name}}"
set-option -g @catppuccin_window_current_text " #{?#{==:#{window_name},zsh},#T,#{window_name}}"
set-option -g @catppuccin_window_number "#I"
set-option -g @catppuccin_window_current_number "#I"

set-option -g @catppuccin_battery_icon " "
set-option -g @catppuccin_cpu_icon " "

set-option -g status-right-length 100
set-option -g status-left-length 100
set-option -g status-left ""
set-option -g status-right "#{E:@catppuccin_status_session}"
set-option -agF status-right "#{E:@catppuccin_status_cpu}"
set-option -agF status-right "#{E:@catppuccin_status_battery}"
set-option -ag status-right "#{E:@catppuccin_status_uptime}"

# Plugins

set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
